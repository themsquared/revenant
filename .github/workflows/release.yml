name: release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      draft: ${{ steps.v.outputs.draft }}
    steps:
      - id: v
        shell: bash
        # On a tag push ref_name IS the tag and we publish it; on manual
        # dispatch use the input and stage it as a draft for review.
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    uses: ./.github/workflows/build-release.yml
    permissions:
      contents: write
    with:
      version: ${{ needs.resolve.outputs.version }}
      prerelease: false
      draft: ${{ needs.resolve.outputs.draft == 'true' }}

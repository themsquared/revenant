name: release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            zig: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zig: "--zig"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            zig: "--zig"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        shell: bash
        run: echo "version=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install zig + cargo-zigbuild (musl targets)
        if: matrix.zig == '--zig'
        run: |
          pip3 install ziglang
          cargo install --locked cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Package
        run: sh installer/package.sh "${{ steps.v.outputs.version }}" "${{ matrix.target }}" ${{ matrix.zig }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staging
      - name: Assemble release assets
        run: |
          mkdir -p dist
          find staging -name '*.tar.gz' -exec cp {} dist/ \;
          cd dist
          # One aggregated SHA256SUMS the installer verifies against.
          sha256sum *.tar.gz > SHA256SUMS
          echo "--- release contents ---"; ls -la; cat SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}"
          gh release create "$VERSION" dist/* \
            --repo "${{ github.repository }}" \
            --title "$VERSION" \
            --generate-notes \
            ${{ github.ref_type == 'tag' && ' ' || '--draft' }}

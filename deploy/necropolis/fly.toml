# Fly.io app for the canonical Necropolis directory + hash-linked ledger.
# The ledger lives on a persistent volume so history survives restarts.
#
# Deploy — ALWAYS from the repo root so the Docker build context is the whole
# Cargo workspace (the Dockerfile does `COPY . .` + builds -p revenant-net):
#   fly deploy -a revenant -c deploy/necropolis/fly.toml --dockerfile deploy/necropolis/Dockerfile
#
# The --dockerfile path is resolved from the repo root (the build context), so
# it is NOT set in [build] here — putting it there resolves it relative to this
# config file's dir and doubles the path.
#
# CRITICAL: the volume + [mounts] below are what make the ledger survive
# restarts. Without a volume actually ATTACHED at /data, every redeploy resets
# the whole horde to genesis. After deploy, confirm exactly one necropolis_data
# volume shows an ATTACHED VM in `fly volumes list -a revenant`.
app = "revenant"
primary_region = "iad"

[env]
  PORT = "8080"
  NECROPOLIS_DB = "/data/necropolis.db"

[mounts]
  source = "necropolis_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # a directory should stay up
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "2s"

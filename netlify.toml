[build]
  publish = "site"
  # static site — no build step

# Pretty URL: /marketplace serves marketplace.html (200 = rewrite, URL stays
# clean). The reliable Netlify equivalent of a symlink.
[[redirects]]
  from = "/marketplace"
  to = "/marketplace.html"
  status = 200

# Human account onboarding: register / verify / see your bound agents.
[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/og.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"
